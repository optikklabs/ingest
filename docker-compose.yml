services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DB: optikk
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/clickhouse/config.d/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
      - ./db/clickhouse/config.d/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./db/clickhouse/config.d/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  mariadb:
    image: mariadb:latest
    ports:
      - "13306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: optikk
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: ghcr.io/ramantayal12/mq:latest
    user: "root"
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: "0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "localhost:9092"
      KAFKA_NUM_PARTITIONS: "8"
      KAFKA_AUTO_CREATE_TOPICS: "true"
      KAFKA_LOG_DIRS: "/var/lib/mq"
    volumes:
      - mq_data:/var/lib/mq

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: optikk-otel-collector
    restart: unless-stopped
    environment:
      - OPTIKK_API_KEY=c3448fae
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      # Host fs for the hostmetrics receiver (root_path: /hostfs).
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4319:4318" # OTLP HTTP receiver (4318 is mapped to 4319 to avoid collision if ingest binds 4318 on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka

  # Local Prometheus + Grafana for the Optikk dashboards.
  # Both services run on the host (`go run ./cmd/...`); Prometheus scrapes
  # ingest (:18090) and query (:19090) /metrics via host.docker.internal.
  # Dashboards carry a $service variable to scope per-service or view both.
  # Grafana → http://localhost:13001   Prometheus → http://localhost:19091
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: optikk-prometheus
    restart: unless-stopped
    ports:
      - "19091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: optikk-grafana
    restart: unless-stopped
    ports:
      - "13001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  clickhouse_data:
  mariadb_data:
  mongo_data:
  mq_data:
  prometheus-data:
  grafana-data:
