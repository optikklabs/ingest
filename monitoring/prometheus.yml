# Prometheus scrape config for the local monitoring stack.
#
# Used by the prometheus service in the root docker-compose.yml.
# It scrapes both Optikk services' /metrics endpoints directly — no
# otel-collector needed: ingest (OTLP write path) and query (read API).
# Both export the same optikk_* metric names, so each job carries a distinct
# `component` label; the auto-added `job` label is what the dashboards filter on.
#
# `host.docker.internal` resolves to the host machine from inside the
# Prometheus container (see `extra_hosts` in the compose file). This keeps
# the services running on the host (`go run ./cmd/...`) while Prometheus
# lives in Docker — the typical dev loop.

global:
  scrape_interval: 5s           # tight — sub-minute resolution on ingest rate
  evaluation_interval: 15s
  external_labels:
    env: local
    service: optikk-backend
    stack: local-monitoring

scrape_configs:
  - job_name: optikk-ingest
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:18090"   # ingest /metrics (ingest/config.yml: server.port)
        labels:
          component: ingest

  - job_name: optikk-query
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:19090"   # query /metrics (query/config.yml: server.port)
        labels:
          component: query

  - job_name: prometheus-self
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka:7080"]
        labels:
          component: mq

  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]
        labels:
          component: db
